name: Build and Release APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build release APK
        run: |
          set -o pipefail
          flutter build apk --release 2>&1 | tee build.log

      # Annotations are readable via the public API, unlike step logs
      - name: Surface build errors as annotations
        if: failure()
        run: |
          grep -E "error:|Error:|FAILURE:|Caused by|What went wrong|Execution failed" -A 2 build.log | head -25 | while IFS= read -r line; do
            [ -n "$line" ] && echo "::error::$line"
          done
          tail -5 build.log | while IFS= read -r line; do
            [ -n "$line" ] && echo "::error::TAIL: $line"
          done

      - name: Rename APK with version
        run: cp build/app/outputs/flutter-apk/app-release.apk quiverdesk-${{ github.ref_name }}.apk

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          files: |
            quiverdesk-${{ github.ref_name }}.apk
            build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
